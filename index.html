<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <div class="wrapper">
        <div class="header">
            <div class="title">PF2e Counteract Check</div>
            <div class="mode-toggle">
                <svg alt="Button to change between light and dark modes" class="light-dark-mode" xmlns="http://www.w3.org/2000/svg" width="2em" height="2em" viewBox="0 0 512 512"><path fill="var(--text-color)" fill-rule="evenodd" d="M277.333 405.333v85.333h-42.667v-85.333zm99.346-58.824l60.34 60.34l-30.17 30.17l-60.34-60.34zm-241.359 0l30.17 30.17l-60.34 60.34l-30.17-30.17zM256 139.353c64.422 0 116.647 52.224 116.647 116.647c0 64.422-52.225 116.647-116.647 116.647A116.427 116.427 0 0 1 139.352 256c0-64.423 52.225-116.647 116.648-116.647m0 42.666c-40.859 0-73.981 33.123-73.981 74.062a73.76 73.76 0 0 0 21.603 52.296c13.867 13.867 32.685 21.64 52.378 21.603zm234.666 52.647v42.667h-85.333v-42.667zm-384 0v42.667H21.333v-42.667zM105.15 74.98l60.34 60.34l-30.17 30.17l-60.34-60.34zm301.7 0l30.169 30.17l-60.34 60.34l-30.17-30.17zM277.332 21.333v85.333h-42.667V21.333z"/></svg>
            </div>
        </div>
        <div class="counteract-container">
            <div class="input-container">
                <div class="effect-container">
                    <fieldset>
                        <legend>Counteract Effect</legend>
                        <div class="source">
                            <label for="effect-source">Source</label>
                            <select name="source" id="effect-source">
                                <option value="spell" selected>Spell</option>
                                <option value="other">Item, Class Ability, etc</option>
                            </select>
                        </div>
                        <div class="rank" id="effect-rank-container">
                            <label for="effect-rank" id="effect-rank-label">Spell rank</label>
                            <select name="rank" id="effect-rank">
                                <option value="">Select a spell rank</option>
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                        </div>
                        <div class="level" id="effect-level-container">
                            <label for="effect-level">Effect level</label>
                            <select name="level" id="effect-level">
                                <option value="">Select an effect level</option>
                                <option value="-1">-1</option>
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="17">17</option>
                                <option value="18">18</option>
                                <option value="19">19</option>
                                <option value="20">20</option>
                                <option value="21">21</option>
                                <option value="22">22</option>
                                <option value="23">23</option>
                                <option value="24">24</option>
                                <option value="25">25</option>
                                <option value="26">26</option>
                                <option value="27">27</option>
                                <option value="28">28</option>
                            </select>
                        </div>
                        <hr>
                        <div class="roll-input">
                            <label for="effect-roll">Roll total</label>
                            <input type="number" id="effect-roll" name="effect-roll" min="0" max="100" placeholder="eg: 24" inputmode="numeric">
                        </div>
                        <div class="radio">
                            <p class="roll-adjustment">Roll adjustment</p>
                            <div class="radio-none">
                                <input type="radio" id="roll-none" name="roll-specifics" value="none" checked>
                                <label for="roll-none">None</label>
                            </div>
                            <div class="radio-one">
                                <input type="radio" id="roll-nat-one" name="roll-specifics" value="nat-one">
                                <label for="roll-nat-one">Natural 1</label>
                            </div>
                            <div class="radio-twenty">
                                <input type="radio" id="roll-nat-twenty" name="roll-specifics" value="nat-twenty">
                                <label for="roll-nat-twenty">Natural 20</label>
                            </div>
                        </div>
                    </fieldset>
                </div>
                <div class="target-container">
                    <fieldset>
                        <legend>Counteract Target</legend>
                        <div class="source">
                            <label for="target-source">Source</label>
                            <select name="source" id="target-source">
                                <option selected="selected"value="spell">Spell</option>
                                <option value="other">Item, Class Ability, etc</option>
                            </select>
                        </div>
                        <div class="rank" id="target-rank-container">
                            <label for="target-rank">Spell rank</label>
                            <select name="rank" id="target-rank">
                                <option value="">Select a spell rank</option>
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                        </div>
                        <div class="level" id="target-level-container">
                            <label for="target-level">Target level</label>
                            <select name="level" id="target-level">
                                <option value="">Select a target level</option>
                                <option value="-1">-1</option>
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="17">17</option>
                                <option value="18">18</option>
                                <option value="19">19</option>
                                <option value="20">20</option>
                                <option value="21">21</option>
                                <option value="22">22</option>
                                <option value="23">23</option>
                                <option value="24">24</option>
                                <option value="25">25</option>
                                <option value="26">26</option>
                                <option value="27">27</option>
                                <option value="28">28</option>
                            </select>
                        </div>
                        <hr>
                        <div class="target-dc">
                            <label for="target-dc">Target DC</label>
                            <input type="number" id="target-dc" name="target-dc" min="0" max="100" placeholder="eg: 28" inputmode="numeric">
                        </div>
                    </fieldset>
                </div>
            </div>
            <div class="button-container">
                <button class="calculate" id="calculate">
                        Calculate
                </button>
            </div>
            <div class="result-container">
                <p class="label">Result</p>
                <div class="result-placeholder">Fill out the fields above and click Calculate</div>
            </div>
        </div>
